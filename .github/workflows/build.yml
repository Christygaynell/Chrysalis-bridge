name: Build Chrysalis Bridge Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download Playwright Chromium browser
        run: npx playwright install chromium

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrysalis-bridge-installer
          path: dist/*.exe
          retention-days: 30
